<!doctype html>
<html lang="en" class="force-cursor">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Breathing</title>
    <link rel="stylesheet" href="assets/css/breathing.css" />
    <style>
      .entrance-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #000000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        opacity: 1;
        transition: opacity 1s ease-in-out;
      }

      .entrance-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .entrance-text {
        text-align: center;
        color: rgba(255, 255, 255, 0.7);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        animation: fadeInUp 1.2s ease-out;
      }

      .entrance-text p {
        font-size: 18px;
        line-height: 1.6;
        font-weight: 400;
        margin: 0;
      }

      .entrance-text p + p {
        margin-top: 12px;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .entrance-text {
          animation: none;
        }
      }
    </style>
    <script>
      (function ensureCursorPaints() {
        const root = document.documentElement;
        function refreshCursor() {
          root.classList.remove('force-cursor');
          void root.offsetHeight;
          root.classList.add('force-cursor');
        }
        root.classList.add('force-cursor');
        window.addEventListener('pageshow', refreshCursor);
        window.addEventListener('focus', refreshCursor);
        document.addEventListener('visibilitychange', () => {
          if (!document.hidden) refreshCursor();
        });
        ['change', 'blur'].forEach((evt) => {
          document.addEventListener(
            evt,
            (e) => {
              if (e.target && e.target.tagName === 'SELECT') refreshCursor();
            },
            true
          );
        });
      })();
    </script>
  </head>
  <body>
    <div class="entrance-overlay" id="entranceOverlay">
      <div class="entrance-text">
        <p>What does it mean to do nothing?</p>
        <p>Simply breathe.</p>
      </div>
    </div>

    <a href="index.html" class="home-button" aria-label="Back to home" title="Back to home">
      <img src="assets/2026/icon/home.png" alt="Home" class="home-default">
      <img src="assets/2026/icon/home_hover.png" alt="Home" class="home-hover">
    </a>

    <main class="layout">
      <div class="session-bar" id="sessionBar" aria-hidden="true">
        <div class="session-bar__fill" id="sessionBarFill"></div>
      </div>
      <div class="visual-stage">
        <div class="halo-scene">
          <canvas
            id="haloCanvas"
            width="672"
            height="672"
            aria-hidden="true"
          ></canvas>
          <div class="halo-text" id="haloText" data-state="idle" aria-live="polite">
            <span class="halo-label" id="haloLabel" hidden></span>
            <span class="halo-countdown" id="haloCountdown" hidden></span>
          </div>
        </div>
      </div>

      <div class="controls">
        <div class="control-row">
          <label for="modeSelect">Mode</label>
          <select id="modeSelect">
            <option value="box">4–4–4–4 · Box</option>
            <option value="box_8888">8–8–8–8 · Box</option>
            <option value="coherent_55">5–5 · Coherent</option>
            <option value="relax_478">4–7–8 · Relax</option>
            <option value="physiological_sigh_326">3–2–6 · Sigh</option>
          </select>
        </div>

        <div class="control-row">
          <label for="timerSelect">Timer</label>
          <select id="timerSelect">
            <option value="30" selected>00:30</option>
            <option value="60">01:00</option>
            <option value="120">02:00</option>
            <option value="180">03:00</option>
            <option value="300">05:00</option>
            <option value="600">10:00</option>
            <option value="infinity">Infinity</option>
          </select>
        </div>

        <div class="control-row">
          <button class="primary" id="startBtn">Start</button>
          <button id="stopBtn" disabled>Stop</button>
        </div>

      </div>

      <div class="status">
        <div class="mode-description" id="modeDescription"></div>
      </div>
    </main>
    <script src="assets/js/breathing.js"></script>
  </body>
</html>
