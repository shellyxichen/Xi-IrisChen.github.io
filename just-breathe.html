<!doctype html>
<html lang="en" class="force-cursor">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Just Breathe</title>
    <link rel="stylesheet" href="assets/css/breathing.css" />
    <style>
      .entrance-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #000000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        opacity: 1;
        transition: opacity 1s ease-in-out;
      }

      .entrance-overlay.hidden {
        opacity: 0;
        pointer-events: none;
      }

      .entrance-text {
        text-align: center;
        color: rgba(255, 255, 255, 0.7);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          Helvetica, Arial, sans-serif;
        animation: fadeInUp 1.2s ease-out;
      }

      .entrance-text p {
        font-size: 18px;
        line-height: 1.6;
        font-weight: 400;
        margin: 0;
      }

      .entrance-text p + p {
        margin-top: 12px;
      }

      @keyframes fadeInUp {
        from {
          opacity: 0;
          transform: translateY(30px);
        }

        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .entrance-text {
          animation: none;
        }
      }
    </style>
    <script>
      (function ensureCursorPaints() {
        const root = document.documentElement;
        function refreshCursor() {
          root.classList.remove('force-cursor');
          void root.offsetHeight;
          root.classList.add('force-cursor');
        }
        root.classList.add('force-cursor');
        window.addEventListener('pageshow', refreshCursor);
        window.addEventListener('focus', refreshCursor);
        document.addEventListener('visibilitychange', () => {
          if (!document.hidden) refreshCursor();
        });
      })();
    </script>
  </head>
  <body>
    <div class="entrance-overlay" id="entranceOverlay">
      <div class="entrance-text">
        <p>What does it mean to 'do nothing'?</p>
        <p>Just breathe.</p>
      </div>
    </div>

    <a href="index.html" class="home-button" aria-label="Back to home" title="Back to home">
      <img src="assets/2026/icon/home.png" alt="Home" class="home-default">
      <img src="assets/2026/icon/home_hover.png" alt="Home" class="home-hover">
    </a>

    <main class="layout">
      <div class="session-bar" id="sessionBar" aria-hidden="true">
        <div class="session-bar__fill" id="sessionBarFill"></div>
      </div>
      <div class="visual-stage">
        <div class="halo-scene">
          <canvas
            id="haloCanvas"
            width="672"
            height="672"
            aria-hidden="true"
          ></canvas>
          <div class="halo-text" id="haloText" data-state="idle" aria-live="polite">
            <span class="halo-start-label" id="haloStartLabel">Start</span>
            <span class="halo-label" id="haloLabel" hidden></span>
            <span class="halo-countdown" id="haloCountdown" hidden></span>
          </div>
        </div>
      </div>

      <section class="mode-block" id="modeBlock" aria-live="polite">
        <div class="mode-subtitle" id="modeSubtitle"></div>
        <div class="mode-description" id="modeDescription"></div>
        <ol class="mode-dots" id="modeDots" role="tablist" aria-label="Breathing mode"></ol>
      </section>

      <aside class="project-note" id="projectNote">
        <p>
          Inspired by
          <a
            href="https://www.mrjamesnestor.com/breath-book"
            target="_blank"
            rel="noopener noreferrer"
          ><em>Breath</em></a>
          by James Nestor and yoga pranayama. A calm companion for web,
          <a
            href="https://github.com/shellyxichen/Breathe"
            target="_blank"
            rel="noopener noreferrer"
          >iOS</a>,
          and wearable displays.
        </p>
      </aside>

      <aside class="corner-right" id="cornerRight">
        <div class="gesture-hints" id="gestureHints">
          <p class="gesture-hints__desktop">Arrow keys to switch modes</p>
          <p class="gesture-hints__mobile">Swipe to switch modes</p>
          <p>Tap anywhere to start / stop</p>
        </div>
        <button
          class="sound-toggle is-muted"
          id="soundToggle"
          type="button"
          aria-label="Sound off"
          aria-pressed="false"
          title="Sound off"
        >
          <svg class="sound-icon sound-icon--on" viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"
            />
          </svg>
          <svg class="sound-icon sound-icon--off" viewBox="0 0 24 24" aria-hidden="true">
            <path
              fill="currentColor"
              d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"
            />
          </svg>
        </button>
      </aside>
    </main>
    <script src="assets/js/breathing.js"></script>
  </body>
</html>
